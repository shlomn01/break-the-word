<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a1860"/>
      <stop offset="1" stop-color="#0a0628"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5a3aa8"/>
      <stop offset="1" stop-color="#3a1f7a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffd966"/>
      <stop offset="1" stop-color="#c98a1e"/>
    </linearGradient>
  </defs>

  <!-- rounded square background -->
  <rect x="0" y="0" width="64" height="64" rx="12" ry="12" fill="url(#bg)"/>
  <rect x="1" y="1" width="62" height="62" rx="11" ry="11" fill="none" stroke="#ff8a3d" stroke-width="1.5" opacity="0.55"/>

  <!-- gamepad body: rounded with two grips -->
  <g transform="translate(32,34)">
    <path d="M -22 -8
             Q -26 -8 -26 -2
             Q -26 12 -18 12
             Q -12 12 -10 8
             L 10 8
             Q 12 12 18 12
             Q 26 12 26 -2
             Q 26 -8 22 -8 Z"
          fill="url(#body)" stroke="#1a0a4a" stroke-width="1.5"/>

    <!-- D-pad (left side) -->
    <g transform="translate(-13,-1)">
      <rect x="-7" y="-2" width="14" height="4" fill="#1a0a3a" rx="0.5"/>
      <rect x="-2" y="-7" width="4" height="14" fill="#1a0a3a" rx="0.5"/>
      <rect x="-6" y="-1" width="12" height="2" fill="#a47adf"/>
      <rect x="-1" y="-6" width="2" height="12" fill="#a47adf"/>
    </g>

    <!-- Action buttons (right side) - gold ball + orange button -->
    <circle cx="14" cy="-4" r="3" fill="#ff8a3d" stroke="#6a1a1a" stroke-width="0.8"/>
    <circle cx="14" cy="-4" r="1" fill="#ffd966" opacity="0.8"/>
    <circle cx="9" cy="3" r="3" fill="url(#gold)" stroke="#6a4a0a" stroke-width="0.8"/>
    <circle cx="9" cy="3" r="0.9" fill="#fff5b8"/>

    <!-- Center select line -->
    <rect x="-2" y="-7" width="4" height="1.5" fill="#ffd966" opacity="0.85" rx="0.5"/>
  </g>

  <!-- top: gold brick with Hebrew letter (alef-like glyph) suggesting the word game -->
  <g>
    <rect x="10" y="8" width="44" height="14" fill="url(#gold)" stroke="#6a4a0a" stroke-width="1"/>
    <rect x="11" y="9" width="42" height="2" fill="#fff5b8" opacity="0.7"/>
    <text x="32" y="20" text-anchor="middle" font-family="'Arial Hebrew', Arial, sans-serif"
          font-size="12" font-weight="900" fill="#3a1a04">א</text>
  </g>

  <!-- glowing ball above paddle area -->
  <circle cx="46" cy="28" r="2.6" fill="#ffd966" stroke="#6a1a1a" stroke-width="0.6"/>
  <circle cx="45.2" cy="27.2" r="0.9" fill="#fff5b8"/>
</svg>
